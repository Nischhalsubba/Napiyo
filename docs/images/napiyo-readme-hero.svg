<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Napiyo Nepal land measurement utility</title>
  <desc id="desc">Product thumbnail showing Nepal land unit conversion, smart map measurement, saved calculations, and plot visualization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#020617"/><stop offset="1" stop-color="#172554"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#1e293b"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity=".34"/></filter>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <circle cx="110" cy="96" r="120" fill="#2563eb" opacity=".12"/>
  <circle cx="1080" cy="550" r="180" fill="#38bdf8" opacity=".08"/>
  <g transform="translate(72 74)">
    <rect width="64" height="64" rx="18" fill="#2563eb"/>
    <text x="32" y="43" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="white">N.</text>
    <text x="88" y="31" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="white">Napiyo</text>
    <text x="88" y="57" font-family="Arial, sans-serif" font-size="16" fill="#93c5fd">Nepal land measurement, without the confusion.</text>
  </g>
  <g transform="translate(72 190)">
    <text font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="white">Convert. Measure. Visualize.</text>
    <text y="48" font-family="Arial, sans-serif" font-size="21" fill="#cbd5e1">Ropani, Aana, Paisa, Daam, Bigha, Kattha, Dhur and global units.</text>
    <g transform="translate(0 100)">
      <rect width="210" height="54" rx="27" fill="#1d4ed8"/><text x="105" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white">Instant conversion</text>
      <rect x="226" width="210" height="54" rx="27" fill="#0f766e"/><text x="331" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white">Smart map measure</text>
      <rect x="452" width="180" height="54" rx="27" fill="#7c3aed"/><text x="542" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white">Saved history</text>
    </g>
    <g transform="translate(0 190)" font-family="Arial, sans-serif">
      <text font-size="16" font-weight="700" fill="#93c5fd">1 Ropani</text><text x="92" font-size="16" fill="#e2e8f0">= 16 Aana = 5,476 sq.ft</text>
      <text y="34" font-size="16" font-weight="700" fill="#86efac">1 Bigha</text><text x="82" y="34" font-size="16" fill="#e2e8f0">= 20 Kattha = 72,900 sq.ft</text>
      <text y="68" font-size="16" font-weight="700" fill="#fcd34d">Local-first</text><text x="88" y="68" font-size="16" fill="#e2e8f0">saved measurements stay in the browser</text>
    </g>
  </g>
  <g transform="translate(738 74)" filter="url(#shadow)">
    <rect width="390" height="482" rx="26" fill="#0b1220" stroke="#334155"/>
    <rect x="22" y="22" width="346" height="66" rx="16" fill="url(#card)"/>
    <text x="42" y="49" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#94a3b8">I HAVE</text>
    <text x="42" y="74" font-family="Arial, sans-serif" font-size="27" font-weight="800" fill="white">1 Ropani</text>
    <g transform="translate(22 110)">
      <rect width="106" height="106" rx="16" fill="url(#card)" stroke="#334155"/>
      <text x="14" y="26" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">HILL SYSTEM</text>
      <text x="14" y="62" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="white">1-0-0-0</text>
      <text x="14" y="84" font-family="Arial, sans-serif" font-size="9" fill="#64748b">R-A-P-D</text>
      <rect x="120" width="106" height="106" rx="16" fill="url(#card)" stroke="#334155"/>
      <text x="134" y="26" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">TERAI SYSTEM</text>
      <text x="134" y="62" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="white">0-1-10.4</text>
      <text x="134" y="84" font-family="Arial, sans-serif" font-size="9" fill="#64748b">B-K-D</text>
      <rect x="240" width="106" height="106" rx="16" fill="url(#card)" stroke="#334155"/>
      <text x="254" y="26" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">GLOBAL</text>
      <text x="254" y="59" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#60a5fa">5,476</text>
      <text x="254" y="81" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">sq.ft</text>
    </g>
    <g transform="translate(22 240)">
      <rect width="346" height="154" rx="18" fill="#111827" stroke="#334155"/>
      <text x="18" y="28" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#94a3b8">SMART MEASURE</text>
      <path d="M35 118 L82 60 L145 76 L204 40 L296 66 L318 118 Z" fill="#2563eb" opacity=".25" stroke="#60a5fa" stroke-width="3"/>
      <circle cx="82" cy="60" r="5" fill="white"/><circle cx="145" cy="76" r="5" fill="white"/><circle cx="204" cy="40" r="5" fill="white"/><circle cx="296" cy="66" r="5" fill="white"/>
      <text x="18" y="142" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Calibrate scale • Trace plot • Save report</text>
    </g>
    <g transform="translate(22 414)">
      <rect width="104" height="42" rx="21" fill="#1d4ed8"/><text x="52" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white">Converter</text>
      <rect x="121" width="104" height="42" rx="21" fill="#1e293b"/><text x="173" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#cbd5e1">Measure</text>
      <rect x="242" width="104" height="42" rx="21" fill="#1e293b"/><text x="294" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#cbd5e1">History</text>
    </g>
  </g>
</svg>