name: Cloudflare build gate

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-cloudflare-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Typecheck, test, and build Cloudflare Pages output
        run: npm run build:cloudflare
      - name: Verify Pages artifacts
        run: |
          test -f dist/index.html
          test -f dist/_headers
          test -f dist/_redirects
          test -f dist/manifest.webmanifest
          test -f dist/sw.js
